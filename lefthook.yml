pre-commit:
  parallel: true
  commands:
    biome-fix:
      glob: "*.{ts,tsx,js,jsx,css,json}"
      run: pnpm biome check --fix --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm test
